<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle Ekhaya - Home User Sign Up</title>
    <link rel="stylesheet" href="landingPagecss.css">
</head>
<body>

<div class="signup-wrapper">
    <div class="signup-bg" style="background-image: url('images/image-bg-02.jpg');"></div>
    <div class="signup-overlay"></div>

    <div class="signup-container">
        <div class="signup-box">
            <h2 class="signup-title">Sign Up as Home User</h2>

            <form class="signup-form" action="#" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="tel" name="phone" placeholder="Phone Number" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="passwordConfirm" placeholder="Password Confirmation" required>
                <button type="submit" class="signup-btn">Sign Up</button>
            </form>

            <p class="signup-note">
                Already have an account? 
                <a href="login.html">Log in</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
